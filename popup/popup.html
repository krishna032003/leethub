<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LeetCode Auto-Sync</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h2>LeetCode Auto-Sync</h2>
    
    <div class="form-group">
      <label for="github-token">GitHub Personal Access Token</label>
      <input type="password" id="github-token" placeholder="ghp_xxxxxxxxxxxx">
      <small>Required permissions: repo (Full control of private repositories)</small>
    </div>

    <div class="form-group">
      <label for="github-repo">GitHub Repository</label>
      <input type="text" id="github-repo" placeholder="username/repository">
      <small>Example: krishna032003/Krishna-Codes</small>
    </div>

    <button id="save-btn">Save Settings</button>

    <div id="status-msg"></div>

    <hr>
    
    <div class="logs-section">
      <h3>Recent Activity</h3>
      <div id="logs-container">
        <em>No recent syncs yet.</em>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
