<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LeetHub Sync</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h2>🚀 LeetHub Sync</h2>
    
    <div id="unauth-section">
      <p class="desc">Connect your GitHub account to automatically sync your LeetCode submissions.</p>
      <button id="auth-btn" class="btn-primary">Connect with GitHub</button>
    </div>

    <div id="auth-section" class="hidden">
      <p class="desc">Authenticated as <strong id="gh-username">...</strong></p>
      
      <div class="form-group">
        <label for="repo-select">Select Target Repository:</label>
        <select id="repo-select" disabled>
          <option value="">Loading repositories...</option>
        </select>
      </div>

      <button id="link-btn" class="btn-success" disabled>Link Repository</button>
    </div>

    <div id="status-msg"></div>

    <hr>
    
    <div class="logs-section">
      <h3>Recent Activity</h3>
      <div id="logs-container">
        <em>No recent syncs yet.</em>
      </div>
    </div>
  </div>

  <!-- Use type="module" so we can import config.js -->
  <script type="module" src="popup.js"></script>
</body>
</html>
